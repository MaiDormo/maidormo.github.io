<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #000;
      color: #a1a1aa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 5rem; color: #10b981; margin-bottom: 0.5rem; }
    p { font-size: 1.2rem; margin-bottom: 2rem; }
    a {
      color: #10b981;
      text-decoration: none;
      border: 1px solid #10b981;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    a:hover { background: #10b981; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">HOME</a>
  </div>
</body>
</html>
